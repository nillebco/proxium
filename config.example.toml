[deployment]
mode = "none"  # "tailscale", "oidc", "apikey", "none"

[server]
listen = "0.0.0.0:8123"

# Secrets are resolved from environment variables via env:// refs.
# Use `fnox exec cargo run` to inject secrets at startup.

[[services]]
hostname = "openai.localhost"
upstream = "https://api.openai.com"
api_key_ref = "env://OPENAI_API_KEY"
inject_header = "Authorization"
inject_prefix = "Bearer "
ephemeral = false

[[services]]
hostname = "claude.localhost"
upstream = "https://api.anthropic.com"
api_key_ref = "env://ANTHROPIC_API_KEY"
inject_header = "Authorization"
inject_prefix = "Bearer "
ephemeral = false
